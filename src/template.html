<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Todo list </title>
</head>

<body>
    <div class="container">
        <div class="sidebar-heading">
            <h2> Doable </h2>
            <hr>

            <div class="views">
                <ul id="views-items">
                    <li> <button id="view-btn"> Today </button> <span id="amount"> 0 </span> </li>
                    <li> <button id="view-btn"> All tasks </button> <span id="amount"> 0 </span> </li>
                    <li> <button id="view-btn"> Upcoming </button> </li>
                </ul>

            </div>
            <div class="projects">
                <ul id="projects-items">
                    <li> <button id="project-btn"> Default </button> <span id="amount"> 0 </span> </li>
                    <li> <button id="project-btn"> Work </button> <span id="amount"> 0 </span> </li>
                    <li> <button id="project-btn"> Personal </button> <span id="amount"> 0 </span> </li>
                </ul>
                <button id="add-project"> Add project </button>
            </div>
        </div>

        <div class="header-content">
            <div class="header">
                <!-- add dymanic top-header -->
                <div class="top-header"></div>

                <div class="header-buttons">
                    <button id="header-btn"> Filter </button>
                    <button id="header-btn"> Sort </button>
                    <button id="header-btn" command="show-modal" commandfor="add-task-dialog"> Add task </button>
                </div>
                <hr>
            </div>

            <div class="tabs">
                <ul id="tabs-list">
                    <button id="tabs-btn"> All </button>
                    <button id="tabs-btn"> Active </button>
                    <button id="tabs-btn"> Completed </button>
                    <button id="tabs-btn"> High priority </button>
                </ul>
            </div>

            <dialog id="add-task-dialog">
                <form class="add-task-form" action="">
                    <fieldset>
                        <legend> New Task </legend>
                        <hr>
                        <div class="input-group">
                            <label for="title"> Title *</label>
                            <input type="text" id="title" name="title" required placeholder="What needs to be done?"
                                spellcheck="true">
                        </div>

                        <div class="input-group">
                            <label for="desc"> Description </label>
                            <textarea id="desc" name="desc" placeholder="Add details..."
                                spellcheck="true"></textarea>
                        </div>

                        <div class="input-group">
                            <label for="due-date"> Due Date </label>
                            <input type="date" id="due-date" name="due-date">
                        </div>

                        <div class="input-group">
                            <label for="project"> Project </label>
                            <input type="text" id="project" name="project" value="Default">
                        </div>

                        <div class="input-group">
                            <label> Priority </label><br>

                            <label for="priority-high"> High </label>
                            <input type="radio" id="priority-high" name="priority" value="high">

                            <label for="priority-medium"> Medium </label>
                            <input type="radio" id="priority-medium" name="priority" value="medium" checked>

                            <label for="priority-low"> Low </label>
                            <input type="radio" id="priority-low" name="priority" value="low" checked>
                        </div>

                        <button id="cancel" commandfor="add-task-dialog" command="close" type="button"> Cancel </button>
                        <button id="submits" type="submit"> Add Task </button>
                    </fieldset>
                </form>
            </dialog>

            <div class="todos-section">
                <!-- add dynamic small header to each group of items -->
                <!-- this is an example of how it should be -->
                <div class="view-todos">
                    <h3> Today </h3>

                    <div class="view-todos">
                        <div class="view-todos-item">
                            <div class="radio">
                                <input id="check" type="radio">
                                <div class="todo-details">
                                    <h2> Submit project proposal to client </h2>
                                    <div class="bottom">
                                        <p> High </p>
                                        <p> Yesterday </p>
                                        <p> Work </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="view-todos-item">
                            <div class="radio">
                                <input id="check" type="radio">
                                <div class="todo-details">
                                    <h2> Buy groceries for the week </h2>
                                    <div class="bottom">
                                        <p> Medium </p>
                                        <p> Today </p>
                                        <p> Personal </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="view-todos-item">
                            <div class="radio">
                                <input id="check" type="radio">
                                <div class="todo-details">
                                    <h2> Set up dev environment </h2>
                                    <div class="bottom">
                                        <p> Low </p>
                                        <p> Today </p>
                                        <p> Work </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
