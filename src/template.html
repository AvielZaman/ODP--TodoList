<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Todo list </title>
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container" id="container">
        <div class="sidebar-heading">
            <h2> Doable </h2>
            <hr>

            <div class="views-projects">
                <h3> VIEWS </h3>
                <ul id="views-items">
                    <li> <button class="view-btn"> Today <span class="amount"> 0 </span> </button> </li>
                    <li> <button class="view-btn"> All tasks <span class="amount"> 0 </span> </button> </li>
                    <li> <button class="view-btn"> Upcoming </button> </li>
                </ul>
                <h3> PROJECTS </h3>
                <ul id="projects-items">
                    <li><button class="project-btn">
                            <div class="btn-left">
                                <div class="circle circle-default"></div>
                                Default
                            </div>
                            <span class="amount">0</span>
                        </button>
                    </li>
                    <li><button class="project-btn">
                            <div class="btn-left">
                                <div class="circle circle-work"></div>
                                Work
                            </div>
                            <span class="amount">0</span>
                        </button>
                    </li>
                    <li><button class="project-btn">
                            <div class="btn-left">
                                <div class="circle circle-personal"></div>
                                Personal
                            </div>
                            <span class="amount">0</span>
                        </button>
                    </li>
                </ul>

                <button id="add-project"> Add project </button>
            </div>
        </div>

        <div class="header-content">
            <div class="header">
                <div class="top-header"> All tasks</div>
                <div class="header-buttons">
                    <button class="header-btn"> Filter </button>
                    <button class="header-btn"> Sort </button>
                    <button class="header-btn" command="show-modal" commandfor="add-task-dialog"> Add task </button>
                </div>
            </div>
            <hr>

            <div class="tabs">
                <button id="tabs-all"> All </button>
                <button id="tabs-active"> Active </button>
                <button id="tabs-completed"> Completed </button>
                <button id="tabs-high"> High priority </button>
            </div>
            <hr>

            <dialog id="add-task-dialog">
                <form class="add-task-form" action="">
                    <fieldset>
                        <legend> New Task </legend>
                        <hr>
                        <div class="input-group">
                            <label for="title"> Title *</label>
                            <input type="text" id="title" name="title" required placeholder="What needs to be done?"
                                spellcheck="true">
                        </div>

                        <div class="input-group">
                            <label for="desc"> Description </label>
                            <textarea id="desc" name="desc" placeholder="Add details..." spellcheck="true"></textarea>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="due-date">Due Date</label>
                                <input type="date" id="due-date" name="due-date" placeholder="Pick a date">
                            </div>
                            <div class="input-group">
                                <label for="project">Project</label>
                                <input type="text" id="project" name="project" value="Default">
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Priority</label>
                            <div class="priority-group">
                                <button type="button" class="priority-btn" data-value="high">High</button>
                                <button type="button" class="priority-btn active" data-value="medium">Medium</button>
                                <button type="button" class="priority-btn" data-value="low">Low</button>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button id="cancel" commandfor="add-task-dialog" command="close"
                                type="button">Cancel</button>
                            <button id="submits" type="submit">Add task</button>
                        </div>
                    </fieldset>
                </form>
            </dialog>

            <div class="todos-section">
                <div class="view-todos">
                    <h3 class="group-heading"> Today </h3>

                    <div class="view-todos-item">
                        <div class="radio">
                            <input type="radio">
                            <div class="todo-details">
                                <h2> Submit project proposal to client </h2>
                                <div class="bottom">
                                    <p class="tag high"> High </p>
                                    <p> Yesterday </p>
                                    <p> Work </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="view-todos-item">
                        <div class="radio">
                            <input type="radio">
                            <div class="todo-details">
                                <h2> Buy groceries for the week </h2>
                                <div class="bottom">
                                    <p class="tag medium"> Medium </p>
                                    <p> Today </p>
                                    <p> Personal </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="view-todos-item">
                        <div class="radio">
                            <input type="radio">
                            <div class="todo-details">
                                <h2> Set up dev environment </h2>
                                <div class="bottom">
                                    <p class="tag low"> Low </p>
                                    <p> Today </p>
                                    <p> Work </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- DETAIL SIDE PANEL -->
        <div class="detail-panel" id="detail-panel">
            <div class="detail-panel-inner">
                <p class="detail-panel-label">Task detail</p>
                <hr>

                <div class="input-group">
                    <label for="detail-title">Title *</label>
                    <input type="text" id="detail-title" name="title" value="Submit project proposal to client"
                        spellcheck="true">
                </div>

                <div class="input-group">
                    <label for="detail-desc">Description</label>
                    <textarea id="detail-desc" name="desc"
                        spellcheck="true">Finalize the Q3 proposal and send to Sarah. Include revised budget breakdown and timeline.</textarea>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="detail-due-date">Due Date</label>
                        <input type="date" id="detail-due-date" name="due-date" value="2026-06-23">
                    </div>
                    <div class="input-group">
                        <label for="detail-project">Project</label>
                        <input type="text" id="detail-project" name="project" value="Work">
                    </div>
                </div>

                <div class="input-group">
                    <label>Priority</label>
                    <div class="priority-group">
                        <button type="button" class="priority-btn active-high" data-value="high">High</button>
                        <button type="button" class="priority-btn" data-value="medium">Medium</button>
                        <button type="button" class="priority-btn" data-value="low">Low</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Checklist</label>
                    <div class="checklist">
                        <label class="check-item completed"><input type="checkbox" checked> Draft outline</label>
                        <label class="check-item completed"><input type="checkbox" checked> Add budget table</label>
                        <label class="check-item"><input type="checkbox"> Review with manager</label>
                        <label class="check-item"><input type="checkbox"> Send to client</label>
                        <button type="button" class="add-check-item"> Add item</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button id="detail-delete" type="button">Delete</button>
                    <button id="detail-save" type="button">Save changes</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
