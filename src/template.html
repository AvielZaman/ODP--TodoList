<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Todo list </title>
    <!-- remove after finishing css-->
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="sidebar-heading">
            <h2> Doable </h2>
            <hr>

            <div class="views-projects">
                <h3> VIEWS </h3>
                <ul id="views-items">
                    <li> <button class="view-btn"> Today <span class="amount"> 0 </span> </button> </li>
                    <li> <button class="view-btn"> All tasks <span class="amount"> 0 </span> </button> </li>
                    <li> <button class="view-btn"> Upcoming </button> </li>
                </ul>
                <h3> PROJECTS </h3>
                <ul id="projects-items">
                    <li><button class="project-btn">
                            <div class="btn-left">
                                <div class="circle circle-default"></div>
                                Default
                            </div>
                            <span class="amount">0</span>
                        </button>
                    </li>
                    <li><button class="project-btn">
                            <div class="btn-left">
                                <div class="circle circle-work"></div>
                                Work
                            </div>
                            <span class="amount">0</span>
                        </button>
                    </li>
                    <li><button class="project-btn">
                            <div class="btn-left">
                                <div class="circle circle-personal"></div>
                                Personal
                            </div>
                            <span class="amount">0</span>
                        </button>
                    </li>
                </ul>

                <button id="add-project"> Add project </button>
            </div>
        </div>

        <div class="header-content">
            <div class="header">
                <!-- add dymanic top-header -->
                <div class="top-header"> All tasks</div>

                <div class="header-buttons">
                    <button class="header-btn"> Filter </button>
                    <button class="header-btn"> Sort </button>
                    <button class="header-btn" command="show-modal" commandfor="add-task-dialog"> Add task </button>
                </div>
            </div>
            <hr>

            <div class="tabs">
                <button id="tabs-all"> All </button>
                <button id="tabs-active"> Active </button>
                <button id="tabs-completed"> Completed </button>
                <button id="tabs-high"> High priority </button>
            </div>
            <hr>

            <dialog id="add-task-dialog">
                <form class="add-task-form" action="">
                    <fieldset>
                        <legend> New Task </legend>
                        <hr>
                        <div class="input-group">
                            <label for="title"> Title *</label>
                            <input type="text" id="title" name="title" required placeholder="What needs to be done?"
                                spellcheck="true">
                        </div>

                        <div class="input-group">
                            <label for="desc"> Description </label>
                            <textarea id="desc" name="desc" placeholder="Add details..." spellcheck="true"></textarea>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="due-date">Due Date</label>
                                <input type="date" id="due-date" name="due-date" placeholder="Pick a date">
                            </div>
                            <div class="input-group">
                                <label for="project">Project</label>
                                <input type="text" id="project" name="project" value="Default">
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Priority</label>
                            <div class="priority-group">
                                <button type="button" class="priority-btn" data-value="high">High</button>
                                <button type="button" class="priority-btn" data-value="medium">Medium</button>
                                <button type="button" class="priority-btn" data-value="low">Low</button>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button id="cancel" commandfor="add-task-dialog" command="close"
                                type="button">Cancel</button>
                            <button id="submits" type="submit">Add task</button>
                        </div>
                    </fieldset>
                </form>
            </dialog>

            <dialog id="detail-panel-dialog">
                <form class="detail-panel-form" action="">
                    <fieldset>
                        <legend> Task detail </legend>
                        <hr>
                        <!-- need to be dynamically filled from the task that was clicked -->
                        <div class="input-group">
                            <label for="title"> Title * </label>
                            <input type="text" id="title" name="title" required
                                value="Submit project proposal to client" spellcheck="true">
                        </div>

                        <div class="input-group">
                            <label for="desc"> Description </label>
                            <textarea id="desc" name="desc" value="Finalize the Q3 proposal and send to Sarah.
                            Include revised budget breakdown and timeline." spellcheck="true"></textarea>
                        </div>

                        <div class="input-group">
                            <label for="due-date"> Due Date </label>
                            <input type="date" id="due-date" name="due-date" value="23/06/2026">
                        </div>

                        <div class="input-group">
                            <label for="project"> Project </label>
                            <input type="text" id="project" name="project" value="Work">
                        </div>

                        <div class="input-group">
                            <label> Priority </label><br>

                            <label for="priority-high"> High </label>
                            <input type="radio" id="priority-high" name="priority" value="high">

                            <label for="priority-medium"> Medium </label>
                            <input type="radio" id="priority-medium" name="priority" value="medium" checked>

                            <label for="priority-low"> Low </label>
                            <input type="radio" id="priority-low" name="priority" value="low">
                        </div>

                        <div class="input-group">
                            <label> Checklist </label><br>

                            <input type="checkbox" id="check1" name="tasks" value="Draft outline">
                            <label for="check1">Draft outline</label><br>

                            <input type="checkbox" id="check2" name="tasks" value="Add budget table">
                            <label for="check2">Add budget table</label><br>

                            <input type="checkbox" id="check3" name="tasks" value="Review with manager">
                            <label for="check3">Review with manager</label><br>

                            <input type="checkbox" id="check4" name="tasks" value="Send to client">
                            <label for="check4">Send to client</label><br>
                        </div>

                        <button id="close" commandfor="detail-panel-dialog" command="close" type="button"> Cancel
                        </button>
                        <button id="submits" type="submit"> Save changes </button>
                    </fieldset>
                </form>
            </dialog>

            <div class="todos-section">
                <!-- add dynamic small header to each group of items -->
                <!-- this is an example of how it should be -->
                <div class="view-todos">
                    <h3> Today </h3>
                    <!-- just to test the dialog, remove after testing -->
                    <button command="show-modal" commandfor="detail-panel-dialog"> open details </button>
                    <button id="cancel" commandfor="add-task-dialog" command="close" type="button"> Cancel </button>
                    <!---->

                    <div class="view-todos">
                        <div class="view-todos-item">
                            <div class="radio">
                                <input id="check" type="radio">
                                <div class="todo-details">
                                    <h2> Submit project proposal to client </h2>
                                    <div class="bottom">
                                        <p> High </p>
                                        <p> Yesterday </p>
                                        <p> Work </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="view-todos-item">
                            <div class="radio">
                                <input id="check" type="radio">
                                <div class="todo-details">
                                    <h2> Buy groceries for the week </h2>
                                    <div class="bottom">
                                        <p> Medium </p>
                                        <p> Today </p>
                                        <p> Personal </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="view-todos-item">
                            <div class="radio">
                                <input id="check" type="radio">
                                <div class="todo-details">
                                    <h2> Set up dev environment </h2>
                                    <div class="bottom">
                                        <p> Low </p>
                                        <p> Today </p>
                                        <p> Work </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
